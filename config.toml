enable-magisk-update = true # set this to false if you do not want to receive updates for the module in magisk app
parallel-jobs = 1
riplib = true

patches-source = "morpheapp/morphe-patches"
cli-source = "AzyrRuthless/morphe-cli"
rv-brand = "Morphe"
patches-version = "latest"
cli-version = "dev"

#Morphe
[YouTube]
build-mode = "module"
excluded-patches = "'Swipe controls' 'Custom branding' 'Change form factor' 'Shorts autoplay' 'Alternative thumbnails' 'Bypass image region restrictions' 'Enable debugging'"
version = "auto"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"

[YT-Music]
build-mode = "module"
excluded-patches = "'Custom branding' 'Enable debugging'"
arch = "arm64-v8a"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"
