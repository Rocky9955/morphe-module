enable-magisk-update = true   # set this to false if you do not want to receive updates for the module in magisk app
parallel-jobs = 1
riplib = true

patches-source = "morpheapp/morphe-patches"
cli-source = "AzyrRuthless/morphe-cli"
patches-version = "latest"
cli-version = "latest"
rv-brand = "Morphe"

[Youtube]
app-name = "YouTube"
build-mode = "module"
github-release-dlurl = "https://github.com/AzyrRuthless/YTYTM-APK/releases/latest"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"
excluded-patches = "'Alternative thumbnails' 'Bypass image region restrictions' 'Change form factor' 'Swipe controls' 'Translations for YouTube'"

[Music]
app-name = "YouTube Music"
build-mode = "module"
arch = "arm64-v8a"
github-release-dlurl = "https://github.com/AzyrRuthless/YTYTM-APK/releases/latest"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"
excluded-patches = "'Bypass image region restrictions' 'Translations for YouTube Music'"
